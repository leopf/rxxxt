name: unit tests and linting

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: &paths
      - "**/*.py"
      - "web/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [master]
    paths: *paths

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: [3.11, 3.13]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev,testing]

      - name: Run tests
        env:
          CI: 1
        run: |
          python -m unittest discover tests/ -v

      - name: Run ruff linter
        run: |
          ruff check .

  verify-web-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Verify web assets match committed build
        run: |
          pnpm install
          pnpm build:prod
          git diff --exit-code rxxxt/assets/main.js
